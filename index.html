
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Luz Eterna | Área do Jovem</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo-top">
            <h1>Luz Eterna</h1>
            <p>grupo de jovens</p>
        </div>
        <nav id="nav-principal" style="display: none;">
            <a onclick="navegarPara('tela-dashboard')">INÍCIO</a>
            <a onclick="navegarPara('tela-licoes')">LIÇÕES (EBD)</a>
            <a onclick="navegarPara('tela-membros')">MEMBROS</a>
        </nav>
    </header>

    <main>
        <section id="tela-auth" class="tela ativa">
            <div class="auth-card">
                <div class="auth-header">
                    <h2>ÁREA DO JOVEM</h2>
                    <p>Acesse sua EBD</p>
                </div>
                <div class="form-group">
                    <input type="text" id="login-nome" placeholder="Nome de Usuário">
                    <input type="password" id="login-senha" placeholder="Senha">
                </div>
                <button class="btn-entrar" onclick="executarLogin()">ENTRAR</button>
                <button class="btn-cadastro" onclick="alert('Funcionalidade de cadastro')">Solicitar Cadastro</button>
            </div>
        </section>

        <section id="tela-dashboard" class="tela">
            <div id="dashboard-dinamico-conteudo"></div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
